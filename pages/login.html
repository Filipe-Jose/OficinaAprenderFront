<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar | OficinaAprender+</title>
  <link rel="stylesheet" href="../assets/css/login.css" type="text/css">
</head>
<body>
  <div class="bg">
    <span class="blob"></span>
  </div>

  <div class="card" role="main">
    <div class="card-header">
      <button type="button" id="btn-voltar" class="btn-voltar">
        &leftarrow;
      </button>
      <div class="logo">
            <img src="../assets/icons/user-icon.png" class="logo-img">
      </div>
    </div>

    <form>
      <div class="campo">
        <input type="email" name="email" id="email">
        <label for="email">Email</label>
      </div>
      <div class="campo">
        <button type="button" class="toggleSenha" id="toggleSenha">👁</button>
        <input type="password" name="senha" id="senha">
        <label for="senha">Senha</label>
      </div>
    </form>
    
    <div class="card-footer">
      Não possui conta? Cadastre-se <a href="cadastro.html">aqui</a>!
    </div>
  </div>

  <script src="../assets/js/login.js"></script>
</body>
</html>
