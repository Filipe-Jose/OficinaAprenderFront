<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar | OficinaAprender+</title>
  <link rel="stylesheet" href="../assets/css/cadastro.css" type="text/css">
</head>
<body>

  <div class="card" role="main">
    <div class="card-header">
      <button type="button" id="btn-voltar" class="btn-voltar">
        &leftarrow;
      </button>
      <div class="logo">
        <img src="../assets/icons/user-icon.png" class="logo-img">
      </div>
    </div>

    <form id="form-cadastro">
      <div class="campo">
        <input type="text" name="nome" id="nome" autocomplete="name">
        <label for="nome">Nome completo</label>
      </div>
      <div class="campo">
        <input type="email" name="email" id="email" autocomplete="email">
        <label for="email">Email</label>
      </div>
      <div class="campo">
        <button type="button" class="toggleSenha" id="toggleSenha">👁</button>
        <input type="password" name="senha" id="senha" autocomplete="new-password">
        <label for="senha">Senha</label>
      </div>

      <div class="campo-tipo">
        <span class="tipo-label">Tipo de conta</span>
        <div class="tipo-opcoes">
          <button type="button" class="btn-tipo" data-role="ROLE_PROFISSIONAL">Profissional</button>
          <button type="button" class="btn-tipo" data-role="ROLE_FAMILIA">Família</button>
          <button type="button" class="btn-tipo" data-role="ROLE_ESCOLA">Escola</button>
        </div>
        <input type="hidden" id="role" name="role">
      </div>

      <p class="erro-msg" id="erro-msg"></p>
      <button type="submit" class="btn-cadastrar" id="btn-cadastrar">Criar conta</button>
    </form>

    <div class="card-footer">
      Já possui conta? Entre <a href="login.html">aqui</a>!
    </div>
  </div>

  <script src="../assets/js/cadastro.js"></script>
</body>
</html>
