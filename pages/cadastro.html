<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar | OficinaAprender+</title>
  <link rel="stylesheet" href="../assets/css/cadastro.css" type="text/css">
</head>
<body>

  <div class="card" role="main">
    <div class="card-header">
      <button type="button" id="btn-voltar" class="btn-voltar" aria-label="Voltar">
        &leftarrow;
      </button>
      <div class="logo">
        <img src="../assets/icons/user-icon.png" class="logo-img" alt="Logo">
      </div>
    </div>

    <form id="form-cadastro" novalidate>
      <div class="campo">
        <input type="text" name="nome" id="nome">
        <label for="nome">Nome completo</label>
      </div>
      <div class="campo">
        <input type="email" name="email" id="email">
        <label for="email">Email</label>
      </div>
      <div class="campo">
        <input type="password" name="senha" id="senha">
        <label for="senha">Senha</label>
        <button type="button" class="toggle-senha" id="toggle-senha" aria-label="Mostrar senha"></button>
      </div>

      <button type="submit" class="btn-submit" id="btn-cadastrar">
        <div class="spinner"></div>
        <span class="btn-texto">Cadastrar</span>
      </button>
    </form>

    <div class="card-footer">
      Já possui conta? Entre <a href="login.html">aqui</a>!
    </div>
  </div>

  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/cadastro.js"></script>
</body>
</html>
